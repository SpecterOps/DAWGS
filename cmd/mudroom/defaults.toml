[database]
graph = ""
all_graphs = false

[exploration]
node_sample_limit = 1000
relationship_sample_limit = 1000
histogram_limit = 25

[opengraph]
input = ""
output = ""
manifest = ""
plan = ""

[scrub]
mode = "shape_only"
salt = ""
fake_domain = "example.invalid"
timestamp_shift_days = 37
redaction_marker = "[REDACTED]"

[scrub.graph_rules]
domain_kind = "Domain"
objectid_key = "objectid"
domain_name_key = "name"
domain_sid_reference_keys = [
  "domainsid",
]
objectid_reference_keys = [
  "ownersid",
  "tenantid",
  "onpremid",
  "distinguishedname",
]
self_objectid_alias_keys = [
  "objectguid",
]
domain_name_reference_keys = [
  "domain",
]
case_insensitive_domain_names = true
preserve_ad_sid_domain_prefixes = true

[classifier]
long_text_threshold = 80
max_depth = 4
identifier_minimum_samples = 20
identifier_uniqueness_threshold = 0.85
identifier_minimum_average_length = 8.0
preserve_keys = [
