version: "2"
linters:
  settings:
    staticcheck:
      checks: 
        - all
formatters:
  enable:
    - gofmt
    - goimports
severity:
  default: "major"
  rules:
    - linters:
        - gofmt
      severity: info
    - linters:
        - errcheck
      severity: minor
output:  
  formats:
    json:
      path: golangci-report.json