[scrub]
fake_domain = "example.invalid"
timestamp_shift_days = 17
redaction_marker = "[REDACTED]"

[scrub.graph_rules]
domain_kind = "Domain"
objectid_key = "objectid"
domain_name_key = "domain"
domain_sid_reference_keys = ["domainsid", "domain_sid"]
objectid_reference_keys = ["objectid", "object_id", "sid", "owner_sid", "primarygroupid"]
self_objectid_alias_keys = ["objectsid"]
domain_name_reference_keys = ["domain", "domain_name"]
case_insensitive_domain_names = true
preserve_ad_sid_domain_prefixes = true

[classifier]
long_text_threshold = 512
preserve_keys = ["objectid", "domainsid", "kind"]
sensitive_key_markers = [
  "password",
  "secret",
  "token",
  "credential",
  "privatekey",
  "private_key",
  "apikey",
  "api_key",
  "email",
  "mail",
  "phone",
  "address",
  "name",
  "displayname",
  "samaccountname",
  "userprincipalname",
  "dns",
  "hostname",
]

[[classifier.value_shapes]]
name = "email"
pattern = "(?i)^[a-z0-9._%+\\-]+@[a-z0-9.\\-]+\\.[a-z]{2,}$"

[[classifier.value_shapes]]
name = "uuid"
pattern = "(?i)^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"

[[classifier.value_shapes]]
name = "domain_sid"
pattern = "^S-1-5-21-\\d+-\\d+-\\d+$"

[[classifier.value_shapes]]
name = "object_sid"
pattern = "^(S-1-5-21-\\d+-\\d+-\\d+)-(\\d+)$"

[[classifier.value_shapes]]
name = "ipv4"
pattern = "^(\\d{1,3}\\.){3}\\d{1,3}$"

[[classifier.value_shapes]]
name = "host"
pattern = "(?i)^[a-z0-9][a-z0-9-]*(\\.[a-z0-9][a-z0-9-]*)+$"
